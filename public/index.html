<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Periyodik Tablo — Bileşik Analiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2229;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #4ade80;
      --accent-dim: rgba(74,222,128,0.12);

      --nonmetal: #2d4a1e;
      --nonmetal-t: #86efac;
      --noble: #3b2d0a;
      --noble-t: #fcd34d;
      --alkali: #3b0f0f;
      --alkali-t: #fca5a5;
      --alkearth: #3b2500;
      --alkearth-t: #fdba74;
      --metalloid: #0f3b3b;
      --metalloid-t: #67e8f9;
      --halogen: #0f1f3b;
      --halogen-t: #93c5fd;
      --transition: #1a0f3b;
      --transition-t: #c4b5fd;
      --postrans: #1f1f2e;
      --postrans-t: #a5b4fc;
      --lanthanide: #2d0f2d;
      --lanthanide-t: #f0abfc;
      --actinide: #3b0f1a;
      --actinide-t: #fda4af;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.8rem;
      color: var(--muted);
    }

    #legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 1.25rem;
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
    }

    .leg-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    #pt-grid {
      display: grid;
      grid-template-columns: repeat(18, minmax(0, 1fr));
      gap: 2px;
      margin-bottom: 1.5rem;
    }

    .el-cell {
      aspect-ratio: 1;
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      transition: transform 0.1s ease, border-color 0.1s ease, box-shadow 0.1s ease;
      min-width: 0;
      padding: 1px;
      position: relative;
    }

    .el-cell:hover {
      transform: scale(1.2);
      z-index: 20;
      border-color: rgba(255,255,255,0.3);
    }

    .el-cell.selected {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 1px var(--accent);
      transform: scale(1.05);
      z-index: 10;
    }

    .el-cell .sym {
      font-family: 'Space Mono', monospace;
      font-size: clamp(6px, 1.2vw, 10px);
      font-weight: 700;
      line-height: 1;
    }

    .el-cell .num {
      font-size: clamp(4px, 0.8vw, 7px);
      opacity: 0.6;
      line-height: 1;
    }

    .el-cell.empty { cursor: default; background: transparent !important; border: none; }

    .cat-nonmetal    { background: var(--nonmetal);   color: var(--nonmetal-t); }
    .cat-noble       { background: var(--noble);       color: var(--noble-t); }
    .cat-alkali      { background: var(--alkali);      color: var(--alkali-t); }
    .cat-alkearth    { background: var(--alkearth);    color: var(--alkearth-t); }
    .cat-metalloid   { background: var(--metalloid);   color: var(--metalloid-t); }
    .cat-halogen     { background: var(--halogen);     color: var(--halogen-t); }
    .cat-transition  { background: var(--transition);  color: var(--transition-t); }
    .cat-postrans    { background: var(--postrans);    color: var(--postrans-t); }
    .cat-lanthanide  { background: var(--lanthanide);  color: var(--lanthanide-t); }
    .cat-actinide    { background: var(--actinide);    color: var(--actinide-t); }

    #basket-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    #basket-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    #basket-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
      min-height: 28px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--accent-dim);
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 99px;
      padding: 3px 10px 3px 12px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      cursor: default;
    }

    .chip-rm {
      cursor: pointer;
      font-size: 14px;
      color: rgba(74,222,128,0.5);
      line-height: 1;
      transition: color 0.1s;
    }
    .chip-rm:hover { color: var(--accent); }

    #basket-empty {
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }

    #analyze-btn {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 8px 18px;
      border-radius: 7px;
      border: 1px solid rgba(74,222,128,0.4);
      background: var(--accent-dim);
      color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    #analyze-btn:hover:not(:disabled) {
      background: rgba(74,222,128,0.2);
      border-color: rgba(74,222,128,0.7);
    }
    #analyze-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #result-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      min-height: 100px;
    }

    #result-placeholder {
      font-size: 13px;
      color: var(--muted);
      font-style: italic;
    }

    #result-content {
      display: none;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
    }

    #result-content h3 {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin: 1.25rem 0 0.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    #result-content h3:first-child { margin-top: 0; }

    #result-content p {
      margin-bottom: 0.5rem;
      color: #c9cbd5;
    }

    #loading-state {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-hover);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg {
      display: none;
      font-size: 13px;
      color: #fca5a5;
      padding: 8px 12px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 6px;
    }

    .tooltip {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2229;
      border: 1px solid var(--border-hover);
      color: var(--text);
      font-size: 10px;
      white-space: nowrap;
      padding: 3px 7px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .el-cell:hover .tooltip { opacity: 1; }
  </style>
</head>
<body>

  <header>
    <h1>⬡ Periyodik Tablo</h1>
    <p>Element seç → Analiz et → Bileşik keşfet</p>
  </header>

  <div id="legend">
    <span class="leg"><span class="leg-dot" style="background:var(--nonmetal-t)"></span>Ametal</span>
    <span class="leg"><span class="leg-dot" style="background:var(--noble-t)"></span>Soy gaz</span>
    <span class="leg"><span class="leg-dot" style="background:var(--alkali-t)"></span>Alkali</span>
    <span class="leg"><span class="leg-dot" style="background:var(--alkearth-t)"></span>Toprak alk.</span>
    <span class="leg"><span class="leg-dot" style="background:var(--metalloid-t)"></span>Yarımetal</span>
    <span class="leg"><span class="leg-dot" style="background:var(--halogen-t)"></span>Halojen</span>
    <span class="leg"><span class="leg-dot" style="background:var(--transition-t)"></span>Geçiş met.</span>
    <span class="leg"><span class="leg-dot" style="background:var(--postrans-t)"></span>Post-geçiş</span>
    <span class="leg"><span class="leg-dot" style="background:var(--lanthanide-t)"></span>Lantanid</span>
    <span class="leg"><span class="leg-dot" style="background:var(--actinide-t)"></span>Aktinid</span>
  </div>

  <div id="pt-grid"></div>

  <div id="basket-bar">
    <span id="basket-label">Sepet</span>
    <div id="basket-chips">
      <span id="basket-empty">Element seçmek için tabloya tıkla (max 5)</span>
    </div>
    <button id="analyze-btn" disabled onclick="analyze()">Analiz Et →</button>
  </div>

  <div id="result-panel">
    <div id="loading-state">
      <div class="spinner"></div>
      <span>Analiz ediliyor...</span>
    </div>
    <div id="error-msg"></div>
    <p id="result-placeholder">Elementleri seçip "Analiz Et" butonuna bas.</p>
    <div id="result-content"></div>
  </div>

      {n:71,sym:'Lu',name:'Lutesyum',cat:'lanthanide',col:17,row:8},

      {n:90,sym:'Th',name:'Toryum',cat:'actinide',col:4,row:9},
      {n:91,sym:'Pa',name:'Protaktinyum',cat:'actinide',col:5,row:9},
      {n:92,sym:'U',name:'Uranyum',cat:'actinide',col:6,row:9},
      {n:93,sym:'Np',name:'Neptünyum',cat:'actinide',col:7,row:9},
      {n:94,sym:'Pu',name:'Plutonyum',cat:'actinide',col:8,row:9},
      {n:95,sym:'Am',name:'Amerikyum',cat:'actinide',col:9,row:9},
      {n:96,sym:'Cm',name:'Küryum',cat:'actinide',col:10,row:9},
      {n:97,sym:'Bk',name:'Berkelyum',cat:'actinide',col:11,row:9},
      {n:98,sym:'Cf',name:'Kaliforniyum',cat:'actinide',col:12,row:9},
    ];

    const basket = new Set();

    function buildGrid() {
      const grid = document.getElementById('pt-grid');
      const map = {};
      ELEMENTS.forEach(e => { map[`${e.row}-${e.col}`] = e; });
      for (let row = 1; row <= 9; row++) {
        for (let col = 1; col <= 18; col++) {
          const el = map[`${row}-${col}`];
          const cell = document.createElement('div');
          if (!el) {
            cell.className = 'el-cell empty';
          } else {
            cell.className = `el-cell cat-${el.cat}`;
            cell.innerHTML = `<span class="sym">${el.sym}</span><span class="num">${el.n}</span><span class="tooltip">${el.name}</span>`;
            cell.dataset.sym = el.sym;
            cell.onclick = () => toggleElement(el, cell);
          }
          grid.appendChild(cell);
        }
      }
    }

    function toggleElement(el, cell) {
      if (basket.has(el.sym)) {
        basket.delete(el.sym);
        cell.classList.remove('selected');
      } else {
        if (basket.size >= 5) return;
        basket.add(el.sym);
        cell.classList.add('selected');
      }
      renderBasket();
    }

    function removeChip(sym) {
      basket.delete(sym);
      const cell = document.querySelector(`.el-cell[data-sym="${sym}"]`);
      if (cell) cell.classList.remove('selected');
      renderBasket();
    }

    function renderBasket() {
      const chips = document.getElementById('basket-chips');
      const btn = document.getElementById('analyze-btn');
      const empty = document.getElementById('basket-empty');

      if (basket.size === 0) {
        chips.innerHTML = '';
        chips.appendChild(document.getElementById('basket-empty') || (() => {
          const s = document.createElement('span');
          s.id = 'basket-empty';
          s.textContent = 'Element seçmek için tabloya tıkla (max 5)';
          return s;
        })());
        btn.disabled = true;
        return;
      }

      chips.innerHTML = '';
      basket.forEach(sym => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.innerHTML = `${sym}<span class="chip-rm" onclick="removeChip('${sym}')">×</span>`;
        chips.appendChild(chip);
      });
      btn.disabled = false;
    }

    async function analyze() {
      const elements = Array.from(basket);
      const loading = document.getElementById('loading-state');
      const placeholder = document.getElementById('result-placeholder');
      const content = document.getElementById('result-content');
      const errorMsg = document.getElementById('error-msg');
      const btn = document.getElementById('analyze-btn');

      placeholder.style.display = 'none';
      content.style.display = 'none';
      errorMsg.style.display = 'none';
      loading.style.display = 'flex';
      btn.disabled = true;

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ elements }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Bilinmeyen hata');
        }

        content.innerHTML = formatResult(data.result);
        content.style.display = 'block';
      } catch (err) {
        errorMsg.textContent = 'Hata: ' + (err.message || 'Sunucuya ulaşılamadı. Lütfen tekrar dene.');
        errorMsg.style.display = 'block';
      } finally {
        loading.style.display = 'none';
        btn.disabled = false;
      }
    }

    function formatResult(text) {
      return text
        .replace(/\*\*(.+?)\*\*/g, '<h3>$1</h3>')
        .replace(/\*(.+?)\*/g, '<strong>$1</strong>')
        .split('\n')
        .map(line => {
          line = line.trim();
          if (!line) return '';
          if (line.startsWith('<h3>')) return line;
          return `<p>${line}</p>`;
        })
        .join('');
    }

    buildGrid();
    renderBasket();
  </script>
</body>
</html>
