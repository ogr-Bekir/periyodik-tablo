<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Periyodik Tablo — Bileşik Analiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0f14; --surface:#161920; --surface2:#1e2229;
      --border:rgba(255,255,255,0.07); --border-strong:rgba(255,255,255,0.15);
      --text:#e8eaf0; --muted:#6b7280;
      --accent:#4ade80; --accent-dim:rgba(74,222,128,0.1); --accent-border:rgba(74,222,128,0.3);
      --nonmetal:#1a3010; --nonmetal-t:#86efac;
      --noble:#2d2000; --noble-t:#fcd34d;
      --alkali:#2d0a0a; --alkali-t:#fca5a5;
      --alkearth:#2d1a00; --alkearth-t:#fdba74;
      --metalloid:#002d2d; --metalloid-t:#67e8f9;
      --halogen:#001530; --halogen-t:#93c5fd;
      --transition:#12083a; --transition-t:#c4b5fd;
      --postrans:#141420; --postrans-t:#a5b4fc;
      --lanthanide:#220a22; --lanthanide-t:#f0abfc;
      --actinide:#2d0a12; --actinide-t:#fda4af;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:1.5rem;}

    header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;}
    header h1{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--accent);}
    header p{font-size:0.78rem;color:var(--muted);}

    #legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.75rem;}
    .leg{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);}
    .leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

    #pt-grid{display:grid;grid-template-columns:repeat(18,minmax(0,1fr));gap:2px;margin-bottom:1.25rem;}

    .el-cell{
      aspect-ratio:1;border-radius:3px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      border:1px solid transparent;transition:transform 0.1s,border-color 0.1s;
      min-width:0;position:relative;user-select:none;
    }
    .el-cell:hover{transform:scale(1.3);z-index:20;border-color:rgba(255,255,255,0.3);}
    .el-cell.selected{border-color:var(--accent)!important;box-shadow:0 0 0 1px var(--accent);}
    .el-cell .sym{font-family:'Space Mono',monospace;font-size:clamp(7px,1.4vw,13px);font-weight:700;line-height:1;}
    .el-cell .num{font-size:clamp(5px,0.8vw,8px);opacity:0.55;line-height:1;}
    .el-cell .count-badge{position:absolute;top:1px;right:2px;font-family:'Space Mono',monospace;font-size:clamp(5px,0.8vw,8px);font-weight:700;color:var(--accent);line-height:1;}
    .el-cell.empty{cursor:default;background:transparent!important;border:none;}

    .cat-nonmetal  {background:var(--nonmetal);  color:var(--nonmetal-t);}
    .cat-noble     {background:var(--noble);      color:var(--noble-t);}
    .cat-alkali    {background:var(--alkali);     color:var(--alkali-t);}
    .cat-alkearth  {background:var(--alkearth);   color:var(--alkearth-t);}
    .cat-metalloid {background:var(--metalloid);  color:var(--metalloid-t);}
    .cat-halogen   {background:var(--halogen);    color:var(--halogen-t);}
    .cat-transition{background:var(--transition); color:var(--transition-t);}
    .cat-postrans  {background:var(--postrans);   color:var(--postrans-t);}
    .cat-lanthanide{background:var(--lanthanide); color:var(--lanthanide-t);}
    .cat-actinide  {background:var(--actinide);   color:var(--actinide-t);}

    #formula-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:1rem;}
    #formula-label{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;flex-shrink:0;}
    #formula-display{flex:1;min-height:28px;display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
    .f-chip{display:inline-flex;align-items:center;gap:4px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:6px;padding:2px 8px;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);}
    .f-chip .f-sub{font-size:9px;vertical-align:sub;}
    .f-chip .f-rm{font-size:13px;color:rgba(74,222,128,0.4);margin-left:3px;cursor:pointer;transition:color 0.1s;}
    .f-chip .f-rm:hover{color:var(--accent);}
    #formula-empty{font-size:12px;color:var(--muted);font-style:italic;}
    #formula-text{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);min-width:60px;}
    #clear-btn{font-family:'Space Mono',monospace;font-size:10px;padding:5px 10px;border-radius:6px;border:1px solid var(--border-strong);background:transparent;color:var(--muted);cursor:pointer;}
    #clear-btn:hover{color:var(--text);border-color:var(--text);}
    #analyze-btn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:8px 18px;border-radius:7px;border:1px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);cursor:pointer;flex-shrink:0;transition:background 0.15s;}
    #analyze-btn:hover:not(:disabled){background:rgba(74,222,128,0.2);}
    #analyze-btn:disabled{opacity:0.3;cursor:not-allowed;}

    #result-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px 20px;min-height:90px;}
    #result-placeholder{font-size:13px;color:var(--muted);font-style:italic;}
    #loading-state{display:none;align-items:center;gap:10px;font-size:13px;color:var(--muted);}
    .spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    #error-msg{display:none;font-size:13px;color:#fca5a5;padding:8px 12px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:6px;margin-bottom:8px;}
    #result-content{display:none;}

    .section-title{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent);margin:20px 0 12px;border-bottom:1px solid var(--border);padding-bottom:5px;}

    /* Bileşik kartlar */
    .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-bottom:24px;}
    .compound-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
    .card-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);}
    .card-formula{font-family:'Space Mono',monospace;font-size:26px;font-weight:700;color:var(--accent);line-height:1;}
    .card-name{font-size:13px;color:var(--muted);margin-top:4px;}
    .card-badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
    .badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:10px;font-family:'Space Mono',monospace;}
    .badge-bag{background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);color:var(--accent);}
    .badge-org{background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);color:#fbbf24;}
    .badge-geo{background:rgba(147,197,253,0.1);border:1px solid rgba(147,197,253,0.25);color:#93c5fd;}

    /* Görseller — büyük */
    .card-imgs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
    .card-img-box{padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;background:var(--surface);}
    .card-img-box:first-child{border-right:1px solid var(--border);}
    .card-img-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Mono',monospace;}
    .card-img-box img{width:100%;max-width:150px;height:150px;object-fit:contain;border-radius:8px;background:#fff;padding:4px;}
    .card-img-box img.natural{background:#111;padding:0;object-fit:cover;}
    .no-img{width:100%;max-width:150px;height:150px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--surface2);color:var(--muted);font-size:11px;text-align:center;}

    /* Özellikler */
    .card-props{padding:14px 18px;}
    .props-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;}
    .prop-item{display:flex;flex-direction:column;gap:1px;}
    .prop-key{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-family:'Space Mono',monospace;}
    .prop-val{font-size:12px;color:var(--text);}
    .prop-full{grid-column:1/-1;}

    /* Elektroliz */
    .elektroliz-box{margin-top:10px;padding:10px 12px;background:rgba(147,197,253,0.05);border:1px solid rgba(147,197,253,0.15);border-radius:8px;}
    .elektroliz-title{font-size:9px;color:#93c5fd;text-transform:uppercase;letter-spacing:0.08em;font-family:'Space Mono',monospace;margin-bottom:6px;}
    .elektroliz-row{font-size:11px;color:#c9cbd5;margin-bottom:3px;}
    .elektroliz-row strong{color:#93c5fd;}

    .card-footer{padding:8px 18px 12px;display:flex;gap:10px;}
    .pubchem-link{font-size:11px;color:var(--accent);opacity:0.6;text-decoration:none;}
    .pubchem-link:hover{opacity:1;}

    /* İzotoplar */
    .isotope-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:12px;}
    .iso-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
    .iso-el{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);margin-bottom:8px;}
    .iso-row{font-size:11px;color:var(--muted);margin-bottom:4px;line-height:1.5;}
    .iso-row .iso-sym{font-family:'Space Mono',monospace;font-weight:700;}
    .iso-stable{color:#4ade80!important;}
    .iso-radio{color:#fca5a5!important;}

    .bag-box{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;font-size:13px;line-height:1.8;color:#c9cbd5;}

    .tooltip-el{position:absolute;bottom:115%;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border-strong);color:var(--text);font-size:10px;white-space:nowrap;padding:3px 7px;border-radius:4px;pointer-events:none;opacity:0;transition:opacity 0.12s;z-index:100;}
    .el-cell:hover .tooltip-el{opacity:1;}
  </style>
</head>
<body>

<header>
  <h1>⬡ Periyodik Tablo</h1>
  <p>Tıkla = ekle &nbsp;|&nbsp; Tekrar tıkla = sayı artır &nbsp;|&nbsp; Chip × = sil</p>
</header>

<div id="legend">
  <span class="leg"><span class="leg-dot" style="background:var(--nonmetal-t)"></span>Ametal</span>
  <span class="leg"><span class="leg-dot" style="background:var(--noble-t)"></span>Soy gaz</span>
  <span class="leg"><span class="leg-dot" style="background:var(--alkali-t)"></span>Alkali</span>
  <span class="leg"><span class="leg-dot" style="background:var(--alkearth-t)"></span>Toprak alk.</span>
  <span class="leg"><span class="leg-dot" style="background:var(--metalloid-t)"></span>Yarımetal</span>
  <span class="leg"><span class="leg-dot" style="background:var(--halogen-t)"></span>Halojen</span>
  <span class="leg"><span class="leg-dot" style="background:var(--transition-t)"></span>Geçiş met.</span>
  <span class="leg"><span class="leg-dot" style="background:var(--postrans-t)"></span>Post-geçiş</span>
  <span class="leg"><span class="leg-dot" style="background:var(--lanthanide-t)"></span>Lantanid</span>
  <span class="leg"><span class="leg-dot" style="background:var(--actinide-t)"></span>Aktinid</span>
</div>

<div id="pt-grid"></div>

<div id="formula-bar">
  <span id="formula-label">Formül</span>
  <div id="formula-display">
    <span id="formula-empty">Element seçmek için tabloya tıkla</span>
  </div>
  <span id="formula-text"></span>
  <button id="clear-btn" onclick="clearAll()" style="display:none">Temizle</button>
  <button id="analyze-btn" disabled onclick="analyze()">Analiz Et →</button>
</div>

<div id="result-panel">
  <div id="loading-state"><div class="spinner"></div><span>Analiz ediliyor...</span></div>
  <div id="error-msg"></div>
  <p id="result-placeholder">Elementleri seçip "Analiz Et" butonuna bas.</p>
  <div id="result-content"></div>
</div>

<script>
const ELEMENTS = [
  {n:1,sym:'H',name:'Hidrojen',cat:'nonmetal',col:1,row:1},{n:2,sym:'He',name:'Helyum',cat:'noble',col:18,row:1},

  {n:17,sym:'Cl',name:'Klor',cat:'halogen',col:17,row:3},{n:18,sym:'Ar',name:'Argon',cat:'noble',col:18,row:3},
  {n:19,sym:'K',name:'Potasyum',cat:'alkali',col:1,row:4},{n:20,sym:'Ca',name:'Kalsiyum',cat:'alkearth',col:2,row:4},
  {n:21,sym:'Sc',name:'Skandiyum',cat:'transition',col:3,row:4},{n:22,sym:'Ti',name:'Titanyum',cat:'transition',col:4,row:4},
  {n:23,sym:'V',name:'Vanadyum',cat:'transition',col:5,row:4},{n:24,sym:'Cr',name:'Krom',cat:'transition',col:6,row:4},
  {n:25,sym:'Mn',name:'Manganez',cat:'transition',col:7,row:4},{n:26,sym:'Fe',name:'Demir',cat:'transition',col:8,row:4},
  {n:27,sym:'Co',name:'Kobalt',cat:'transition',col:9,row:4},{n:28,sym:'Ni',name:'Nikel',cat:'transition',col:10,row:4},
  {n:29,sym:'Cu',name:'Bakır',cat:'transition',col:11,row:4},{n:30,sym:'Zn',name:'Çinko',cat:'transition',col:12,row:4},
  {n:31,sym:'Ga',name:'Galyum',cat:'postrans',col:13,row:4},{n:32,sym:'Ge',name:'Germanyum',cat:'metalloid',col:14,row:4},
  {n:33,sym:'As',name:'Arsenik',cat:'metalloid',col:15,row:4},{n:34,sym:'Se',name:'Selenyum',cat:'nonmetal',col:16,row:4},
  {n:35,sym:'Br',name:'Brom',cat:'halogen',col:17,row:4},{n:36,sym:'Kr',name:'Kripton',cat:'noble',col:18,row:4},
  {n:37,sym:'Rb',name:'Rubidyum',cat:'alkali',col:1,row:5},{n:38,sym:'Sr',name:'Stronsiyum',cat:'alkearth',col:2,row:5},
  {n:39,sym:'Y',name:'İtriyum',cat:'transition',col:3,row:5},{n:40,sym:'Zr',name:'Zirkonyum',cat:'transition',col:4,row:5},
  {n:41,sym:'Nb',name:'Niyobyum',cat:'transition',col:5,row:5},{n:42,sym:'Mo',name:'Molibden',cat:'transition',col:6,row:5},
  {n:43,sym:'Tc',name:'Teknesyum',cat:'transition',col:7,row:5},{n:44,sym:'Ru',name:'Rutenyum',cat:'transition',col:8,row:5},
  {n:45,sym:'Rh',name:'Rodyum',cat:'transition',col:9,row:5},{n:46,sym:'Pd',name:'Paladyum',cat:'transition',col:10,row:5},
  {n:47,sym:'Ag',name:'Gümüş',cat:'transition',col:11,row:5},{n:48,sym:'Cd',name:'Kadmiyum',cat:'transition',col:12,row:5},
  {n:49,sym:'In',name:'İndiyum',cat:'postrans',col:13,row:5},{n:50,sym:'Sn',name:'Kalay',cat:'postrans',col:14,row:5},
  {n:51,sym:'Sb',name:'Antimon',cat:'metalloid',col:15,row:5},{n:52,sym:'Te',name:'Tellür',cat:'metalloid',col:16,row:5},

  {n:55,sym:'Cs',name:'Sezyum',cat:'alkali',col:1,row:6},{n:56,sym:'Ba',name:'Baryum',cat:'alkearth',col:2,row:6},
  {n:72,sym:'Hf',name:'Hafniyum',cat:'transition',col:4,row:6},{n:73,sym:'Ta',name:'Tantal',cat:'transition',col:5,row:6},
  {n:74,sym:'W',name:'Tungsten',cat:'transition',col:6,row:6},{n:75,sym:'Re',name:'Renyum',cat:'transition',col:7,row:6},
  {n:76,sym:'Os',name:'Osmiyum',cat:'transition',col:8,row:6},{n:77,sym:'Ir',name:'İridyum',cat:'transition',col:9,row:6},
  {n:78,sym:'Pt',name:'Platin',cat:'transition',col:10,row:6},{n:79,sym:'Au',name:'Altın',cat:'transition',col:11,row:6},
  {n:80,sym:'Hg',name:'Cıva',cat:'transition',col:12,row:6},{n:81,sym:'Tl',name:'Talyum',cat:'postrans',col:13,row:6},
  {n:82,sym:'Pb',name:'Kurşun',cat:'postrans',col:14,row:6},{n:83,sym:'Bi',name:'Bizmut',cat:'postrans',col:15,row:6},
  {n:84,sym:'Po',name:'Polonyum',cat:'metalloid',col:16,row:6},{n:85,sym:'At',name:'Astatin',cat:'halogen',col:17,row:6},
  {n:86,sym:'Rn',name:'Radon',cat:'noble',col:18,row:6},{n:87,sym:'Fr',name:'Fransiyum',cat:'alkali',col:1,row:7},
  {n:88,sym:'Ra',name:'Radyum',cat:'alkearth',col:2,row:7},

  {n:65,sym:'Tb',name:'Terbiyum',cat:'lanthanide',col:11,row:8},{n:66,sym:'Dy',name:'Disprosyum',cat:'lanthanide',col:12,row:8},
  {n:67,sym:'Ho',name:'Holmiyum',cat:'lanthanide',col:13,row:8},{n:68,sym:'Er',name:'Erbiyum',cat:'lanthanide',col:14,row:8},
  {n:69,sym:'Tm',name:'Tulyum',cat:'lanthanide',col:15,row:8},{n:70,sym:'Yb',name:'İterbiyum',cat:'lanthanide',col:16,row:8},
  {n:71,sym:'Lu',name:'Lutesyum',cat:'lanthanide',col:17,row:8},
  {n:89,sym:'Ac',name:'Aktinyum',cat:'actinide',col:3,row:9},{n:90,sym:'Th',name:'Toryum',cat:'actinide',col:4,row:9},
  {n:91,sym:'Pa',name:'Protaktinyum',cat:'actinide',col:5,row:9},{n:92,sym:'U',name:'Uranyum',cat:'actinide',col:6,row:9},
  {n:93,sym:'Np',name:'Neptünyum',cat:'actinide',col:7,row:9},{n:94,sym:'Pu',name:'Plutonyum',cat:'actinide',col:8,row:9},
  {n:95,sym:'Am',name:'Amerikyum',cat:'actinide',col:9,row:9},{n:96,sym:'Cm',name:'Küryum',cat:'actinide',col:10,row:9},
  {n:97,sym:'Bk',name:'Berkelyum',cat:'actinide',col:11,row:9},{n:98,sym:'Cf',name:'Kaliforniyum',cat:'actinide',col:12,row:9},
];

const counts = {};

function buildGrid() {
  const grid = document.getElementById('pt-grid');
  const map = {};
  ELEMENTS.forEach(e => { map[`${e.row}-${e.col}`] = e; });
  for (let row = 1; row <= 9; row++) {
    for (let col = 1; col <= 18; col++) {
      const el = map[`${row}-${col}`];
      const cell = document.createElement('div');
      if (!el) {
        cell.className = 'el-cell empty';
      } else {
        cell.className = `el-cell cat-${el.cat}`;
        cell.dataset.sym = el.sym;
        cell.innerHTML = `<span class="sym">${el.sym}</span><span class="num">${el.n}</span><span class="count-badge"></span><span class="tooltip-el">${el.name}</span>`;
        cell.addEventListener('click', () => addElement(el.sym));
      }
      grid.appendChild(cell);
    }
  }
}

function addElement(sym) { counts[sym] = (counts[sym] || 0) + 1; updateCell(sym); renderFormula(); }
function removeElement(sym) { delete counts[sym]; updateCell(sym); renderFormula(); }

function updateCell(sym) {
  const cell = document.querySelector(`.el-cell[data-sym="${sym}"]`);
  if (!cell) return;
  const c = counts[sym] || 0;
  cell.querySelector('.count-badge').textContent = c > 1 ? c : '';
  cell.classList.toggle('selected', c > 0);
}

function clearAll() { Object.keys(counts).forEach(sym => { delete counts[sym]; updateCell(sym); }); renderFormula(); }

function buildFormulaString() {
  return Object.entries(counts).filter(([,c]) => c > 0).map(([sym,c]) => c===1 ? sym : `${sym}${c}`).join('');
}

function renderFormula() {
  const display = document.getElementById('formula-display');
  const formulaText = document.getElementById('formula-text');
  const clearBtn = document.getElementById('clear-btn');
  const analyzeBtn = document.getElementById('analyze-btn');
  const entries = Object.entries(counts).filter(([,c]) => c > 0);
  if (entries.length === 0) {
    display.innerHTML = '<span id="formula-empty">Element seçmek için tabloya tıkla</span>';
    formulaText.textContent = ''; clearBtn.style.display = 'none'; analyzeBtn.disabled = true; return;
  }
  display.innerHTML = '';
  entries.forEach(([sym, c]) => {
    const chip = document.createElement('span');
    chip.className = 'f-chip';
    chip.innerHTML = sym + (c > 1 ? `<span class="f-sub">${c}</span>` : '') + `<span class="f-rm">×</span>`;
    chip.querySelector('.f-rm').addEventListener('click', e => { e.stopPropagation(); removeElement(sym); });
    display.appendChild(chip);
  });
  formulaText.textContent = buildFormulaString();
  clearBtn.style.display = 'inline-block';
  analyzeBtn.disabled = false;
}

async function analyze() {
  const formula = buildFormulaString();
  if (!formula) return;
  const loading = document.getElementById('loading-state');
  const placeholder = document.getElementById('result-placeholder');
  const content = document.getElementById('result-content');
  const errorMsg = document.getElementById('error-msg');
  const btn = document.getElementById('analyze-btn');
  placeholder.style.display = 'none'; content.style.display = 'none';
  errorMsg.style.display = 'none'; loading.style.display = 'flex'; btn.disabled = true;
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ formula }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Bilinmeyen hata');
    content.innerHTML = data.raw ? `<div class="bag-box">${data.raw.replace(/\n/g,'<br>')}</div>` : renderData(data);
    content.style.display = 'block';
  } catch (err) {
    errorMsg.textContent = 'Hata: ' + (err.message || 'Sunucuya ulaşılamadı');
    errorMsg.style.display = 'block';
  } finally {
    loading.style.display = 'none'; btn.disabled = false;
  }
}

function renderData(data) {
  let html = '';

  if (data.bileskikler && data.bileskikler.length > 0) {
    html += `<div class="section-title">Bileşikler (${data.bileskikler.length})</div><div class="cards-grid">`;
    data.bileskikler.forEach(b => {
      html += `<div class="compound-card">
        <div class="card-header">
          <div class="card-formula">${b.formul}</div>
          <div class="card-name">${b.iupac_adi || ''}</div>
          <div class="card-badges">
            ${b.bag_turu ? `<span class="badge badge-bag">${b.bag_turu}</span>` : ''}
            ${b.organik_mi ? `<span class="badge badge-org">organik</span>` : ''}
            ${b.geometri ? `<span class="badge badge-geo">${b.geometri}</span>` : ''}
          </div>
        </div>`;

      // Görseller
      html += `<div class="card-imgs">
        <div class="card-img-box">
          <span class="card-img-label">2D Yapı</span>
          ${b.img_2d
            ? `<img src="${b.img_2d}" alt="2D yapı" onerror="this.outerHTML='<div class=no-img>2D yapı bulunamadı</div>'"/>`
            : `<div class="no-img">Yapı verisi yok</div>`}
        </div>
        <div class="card-img-box">
          <span class="card-img-label">Doğadaki Hali</span>
          ${b.img_dogal
            ? `<img class="natural" src="${b.img_dogal}" alt="doğal hali" onerror="this.outerHTML='<div class=no-img>Görsel bulunamadı</div>'"/>`
            : `<div class="no-img">Görsel yok</div>`}
        </div>
      </div>`;

      // Özellikler
      html += `<div class="card-props"><div class="props-grid">`;
      if (b.hal)             html += prop('Hal', b.hal);
      if (b.renk)            html += prop('Renk', b.renk);
      if (b.erime_noktasi)   html += prop('Erime', b.erime_noktasi);
      if (b.kaynama_noktasi) html += prop('Kaynama', b.kaynama_noktasi);
      if (b.yogunluk)        html += prop('Yoğunluk', b.yogunluk);
      if (b.polarite)        html += prop('Polarite', b.polarite);
      if (b.organik_sinif)   html += prop('Organik sınıf', b.organik_sinif, true);
      if (b.fonksiyonel_grup)html += prop('Fonk. grup', b.fonksiyonel_grup, true);
      if (b.kullanim)        html += prop('Kullanım', b.kullanim, true);
      html += `</div>`;

      if (b.elektroliz_anot || b.elektroliz_katot) {
        html += `<div class="elektroliz-box">
          <div class="elektroliz-title">Elektroliz Reaksiyonları</div>
          ${b.elektroliz_anot ? `<div class="elektroliz-row"><strong>Anot (+):</strong> ${b.elektroliz_anot}</div>` : ''}
          ${b.elektroliz_katot ? `<div class="elektroliz-row"><strong>Katot (−):</strong> ${b.elektroliz_katot}</div>` : ''}
        </div>`;
      }
      html += `</div>`;

      if (b.pubchem_url) {
        html += `<div class="card-footer"><a class="pubchem-link" href="${b.pubchem_url}" target="_blank">PubChem'de görüntüle →</a></div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  if (data.izotoplar && data.izotoplar.length > 0) {
    html += `<div class="section-title">İzotoplar</div><div class="isotope-grid">`;
    data.izotoplar.forEach(el => {
      html += `<div class="iso-card"><div class="iso-el">${el.element}</div>`;
      (el.izotoplar || []).forEach(iso => {
        const karарли = iso.durum && !iso.durum.toLowerCase().includes('rad');
        html += `<div class="iso-row"><span class="iso-sym ${karарли ? 'iso-stable' : 'iso-radio'}">${iso.sembol}</span><br>${iso.kullanim || iso.durum}</div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  if (data.bag_yapisi) {
    html += `<div class="section-title">Bağ ve Yapı Özeti</div><div class="bag-box">${data.bag_yapisi}</div>`;
  }

  return html || '<p style="color:var(--muted);font-style:italic">Sonuç alınamadı.</p>';
}

function prop(key, val, full = false) {
  return `<div class="prop-item${full ? ' prop-full' : ''}"><span class="prop-key">${key}</span><span class="prop-val">${val}</span></div>`;
}

buildGrid();
renderFormula();
</script>
</body>
</html>
